
        <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blocked</title>
    <style>
        :root {
            --bg-color: #0a0a0c;
            --panel-color: #141417;
            --accent-blue: #1d4ed8;
            --accent-glow: rgba(29, 78, 216, 0.15);
            --text-color: #e4e4e7;
            --text-muted: #71717a;
            --border-color: #27272a;
        }
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }
        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
        }
        #particle-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }
        .browser-container {
            display: flex;
            flex-direction: column;
            height: 100%;
            z-index: 2;
            position: relative;
        }
        .nav-bar {
            background-color: var(--panel-color);
            border-bottom: 1px solid var(--border-color);
            padding: 8px 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            position: relative;
        }
        .nav-buttons {
            display: flex;
            gap: 8px;
        }
        .nav-btn {
            background: transparent;
            border: none;
            color: var(--text-color);
            font-size: 16px;
            cursor: pointer;
            width: 32px;
            height: 32px;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s;
        }
        .nav-btn:hover {
            background-color: var(--border-color);
        }
        .url-bar-container {
            flex-grow: 1;
            display: flex;
            align-items: center;
            background-color: var(--bg-color);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            padding: 4px 8px;
        }
        .url-input {
            width: 100%;
            background: transparent;
            border: none;
            color: var(--text-color);
            font-size: 14px;
            outline: none;
            padding: 4px;
        }
        .progress-container {
            position: absolute;
            bottom: -1px;
            left: 0;
            width: 100%;
            height: 3px;
            background-color: transparent;
            overflow: hidden;
            z-index: 10;
        }
        .progress-bar {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, #3b82f6 0%, #1d4ed8 50%, #60a5fa 100%);
            box-shadow: 0 0 8px #3b82f6;
            transition: width 0.3s ease-out, opacity 0.3s ease-in-out;
            opacity: 0;
        }
        .content-area {
            flex-grow: 1;
            position: relative;
            background-color: var(--bg-color);
        }
        .tab-view {
            width: 100%;
            height: 100%;
            border: none;
            display: none;
            background-color: #ffffff;
        }
        .new-tab-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background-color: transparent;
        }
        .brand-title {
            font-size: 4rem;
            font-weight: 800;
            letter-spacing: -1px;
            background: linear-gradient(135deg, #ffffff 0%, #3b82f6 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 4px;
        }
        .brand-subtitle {
            font-size: 0.75rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 4px;
        }
        .modal {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background-color: var(--panel-color);
            border: 1px solid var(--border-color);
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.5);
            border-radius: 12px;
            padding: 24px;
            z-index: 100;
            width: 90%;
            max-width: 450px;
        }
        .modal-header {
            font-size: 1.25rem;
            font-weight: 600;
            margin-bottom: 16px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            font-size: 13px;
            color: var(--text-muted);
            margin-bottom: 8px;
        }
        .form-input {
            width: 100%;
            background-color: var(--bg-color);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            padding: 10px;
            color: var(--text-color);
            font-size: 14px;
            outline: none;
        }
        .form-input:focus {
            border-color: var(--accent-blue);
        }
        .modal-buttons {
            display: flex;
            justify-content: flex-end;
            gap: 12px;
        }
        .btn {
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 500;
            border: none;
        }
        .btn-primary {
            background-color: var(--accent-blue);
            color: white;
        }
        .btn-secondary {
            background-color: var(--border-color);
            color: var(--text-color);
        }
        .overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.6);
            z-index: 99;
        }
    </style>
</head>
<body>
    <canvas id="particle-canvas"></canvas>
    <div class="browser-container">
        <nav class="nav-bar">
            <div class="nav-buttons">
                <button class="nav-btn" id="back-btn">←</button>
                <button class="nav-btn" id="forward-btn">→</button>
                <button class="nav-btn" id="home-btn">⌂</button>
            </div>
            <div class="url-bar-container">
                <input type="text" class="url-input" id="url-field" placeholder="Initializing engine components...">
                <button class="nav-btn" id="refresh-btn">⟳</button>
            </div>
            <button class="nav-btn" id="settings-btn">⚙</button>
            <div class="progress-container">
                <div class="progress-bar" id="load-progress"></div>
            </div>
        </nav>
        <main class="content-area">
            <div class="new-tab-screen" id="dashboard">
                <h1 class="brand-title" id="main-brand">Vulture</h1>
                <p class="brand-subtitle" id="main-subtitle">Loading...</p>
            </div>
        </main>
    </div>

    <!-- Scripts execution pipeline -->
    <script src="loader.js"></script>
</body>
</html>
